replicaCount: 1
cluster:
  enabled: false
image:
  tag: 7.4.2-debian-12-r6
  registry: docker.io
  repository: bitnami/redis
  pullPolicy: IfNotPresent
architecture: standalone
master:
  disableCommands: []
  persistence:
    enabled: false
  resources:
    requests:
      cpu: "1500m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "2Gi"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - node-1
