architecture: standalone
replicaCount: 1
cluster:
  enabled: false
image:
  tag: 7.4.2-debian-12-r6
  registry: docker.io
  repository: bitnami/redis
  pullPolicy: IfNotPresent
auth:
  enabled: false
master:
  kind: Deployment
  disableCommands: [ ]
  persistence:
    enabled: false
  resources:
    requests:
      cpu: "1500m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "2Gi"
  configuration: |
    maxmemory-policy allkeys-lru
    maxmemory ${MEM}M
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - node-${NODE_IDX}
